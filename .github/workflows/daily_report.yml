name: TW Stock Monitor

# 暫關 schedule，只允許手動觸發。確認本機跑通、設好 secrets 之後再開。
on:
  workflow_dispatch:
    inputs:
      market_choice:
        description: 'Select Market'
        required: true
        default: 'tw-share'
        type: choice
        options:
          - tw-share
  # schedule:
  #   - cron: '30 10 * * 1-5'  # UTC 10:30 = 台灣 18:30，週一~五

permissions:
  contents: read

jobs:
  tw-market-analysis:
    name: 🇹🇼 Taiwan Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache Stock Data
        uses: actions/cache@v4
        with:
          path: data/tw-share/dayK
          key: ${{ runner.os }}-stock-tw-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-stock-tw-

      # Phase 2：三大法人 SQLite，跨 run 累積歷史。每次 run 都更新 key 強制存新版，
      # restore-keys 用前綴 fallback 撈最近一份，確保不丟舊資料。
      - name: Cache Chips DB
        uses: actions/cache@v4
        with:
          path: data/chips.db
          key: ${{ runner.os }}-chips-tw-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-chips-tw-

      # Phase 3：AI summary SQLite cache，14 天 TTL，跨 run 復用避免重新呼叫 LLM
      - name: Cache AI Summary DB
        uses: actions/cache@v4
        with:
          path: data/ai_summary.db
          key: ${{ runner.os }}-ai-summary-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ai-summary-

      - name: Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Analysis
        env:
          # 通知關閉中，這幾個 secret 等之後啟用 NOTIFY_ENABLED 再加：
          # RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # REPORT_RECEIVER_EMAIL: ${{ secrets.REPORT_RECEIVER_EMAIL }}
          # TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Phase 3：Gemini Free tier API key（在 GH repo Settings → Secrets 設）
          # 沒設時 ai_summary 模組會自動跳過，不阻塞 build
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python main.py --market ${{ inputs.market_choice }}

      # 直接把 dist/（main.py 內 build_web 步驟產出）部署到 Cloudflare Pages
      # 用 CF API token + Account ID 透過 wrangler，無需 contents: write
      - name: Deploy dist/ to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=my-stock-monitor --branch=main
